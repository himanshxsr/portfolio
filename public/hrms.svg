<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#12121a"/>
  <!-- Dashboard mockup -->
  <g transform="translate(50, 40)">
    <!-- Browser frame -->
    <rect x="0" y="0" width="300" height="200" rx="6" fill="#1a1a2e" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="300" height="20" rx="6" fill="#1a1a2e"/>
    <circle cx="12" cy="10" r="3" fill="#ff5f57"/>
    <circle cx="24" cy="10" r="3" fill="#febc2e"/>
    <circle cx="36" cy="10" r="3" fill="#28c840"/>
    <!-- Sidebar -->
    <rect x="0" y="20" width="60" height="180" fill="#0f0f18"/>
    <rect x="10" y="35" width="40" height="4" rx="2" fill="#00f0ff" opacity="0.6"/>
    <rect x="10" y="50" width="35" height="3" rx="1.5" fill="#a0a0b0" opacity="0.3"/>
    <rect x="10" y="60" width="30" height="3" rx="1.5" fill="#a0a0b0" opacity="0.3"/>
    <rect x="10" y="70" width="38" height="3" rx="1.5" fill="#a0a0b0" opacity="0.3"/>
    <rect x="10" y="80" width="28" height="3" rx="1.5" fill="#a0a0b0" opacity="0.3"/>
    <!-- Main content area -->
    <!-- Stats cards -->
    <rect x="70" y="30" width="65" height="35" rx="4" fill="#0f0f18" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.2"/>
    <rect x="145" y="30" width="65" height="35" rx="4" fill="#0f0f18" stroke="#7b2ff7" stroke-width="0.5" stroke-opacity="0.2"/>
    <rect x="220" y="30" width="65" height="35" rx="4" fill="#0f0f18" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.2"/>
    <!-- Numbers in cards -->
    <text x="90" y="52" font-size="12" fill="#00f0ff" font-family="monospace" font-weight="bold">128</text>
    <text x="165" y="52" font-size="12" fill="#7b2ff7" font-family="monospace" font-weight="bold">96%</text>
    <text x="240" y="52" font-size="12" fill="#00f0ff" font-family="monospace" font-weight="bold">24</text>
    <text x="80" y="60" font-size="6" fill="#a0a0b0" opacity="0.6">Employees</text>
    <text x="155" y="60" font-size="6" fill="#a0a0b0" opacity="0.6">Attendance</text>
    <text x="230" y="60" font-size="6" fill="#a0a0b0" opacity="0.6">Shifts</text>
    <!-- Chart area -->
    <rect x="70" y="75" width="215" height="80" rx="4" fill="#0f0f18"/>
    <!-- Bar chart -->
    <rect x="85" y="125" width="12" height="25" rx="2" fill="#00f0ff" opacity="0.7"/>
    <rect x="105" y="115" width="12" height="35" rx="2" fill="#00f0ff" opacity="0.8"/>
    <rect x="125" y="105" width="12" height="45" rx="2" fill="#7b2ff7" opacity="0.7"/>
    <rect x="145" y="110" width="12" height="40" rx="2" fill="#00f0ff" opacity="0.6"/>
    <rect x="165" y="100" width="12" height="50" rx="2" fill="#7b2ff7" opacity="0.8"/>
    <rect x="185" y="108" width="12" height="42" rx="2" fill="#00f0ff" opacity="0.7"/>
    <rect x="205" y="95" width="12" height="55" rx="2" fill="#7b2ff7" opacity="0.9"/>
    <rect x="225" y="102" width="12" height="48" rx="2" fill="#00f0ff" opacity="0.8"/>
    <rect x="245" y="112" width="12" height="38" rx="2" fill="#00f0ff" opacity="0.6"/>
    <!-- Table rows -->
    <rect x="70" y="165" width="215" height="6" rx="2" fill="#a0a0b0" opacity="0.1"/>
    <rect x="70" y="175" width="215" height="6" rx="2" fill="#a0a0b0" opacity="0.1"/>
    <rect x="70" y="185" width="215" height="6" rx="2" fill="#a0a0b0" opacity="0.1"/>
  </g>
  <!-- Title -->
  <text x="200" y="275" text-anchor="middle" font-size="12" fill="#a0a0b0" font-family="monospace">HRMS Portal</text>
</svg>
